name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      coturn:
        image: coturn/coturn:latest
        ports:
          - 3478:3478/udp
          - 3478:3478/tcp
        options: >-
          --health-cmd="netstat -tuln | grep 3478"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        env:
          DETECT_EXTERNAL_IP: "yes"
          DETECT_RELAY_IP: "yes"
          LISTENING_PORT: "3478"
          REALM: "nodertc.local"
          USERS: "testuser:testpass,nodertc:nodertcpass"
          MIN_PORT: "49152"
          MAX_PORT: "65535"
    
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify TURN server
        run: |
          echo "Checking if TURN server is accessible..."
          timeout 10 bash -c 'until nc -zv 127.0.0.1 3478; do sleep 1; done' || echo "TURN server not responding (tests may skip TURN)"
      
      - name: Run all tests
        run: npm test
