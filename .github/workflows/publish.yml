name: Publish to NPM

on:
  push:
    tags:
      - 'v*'

jobs:
  # Run the full Test workflow (typecheck + matrix tests + interop) as the gate.
  test:
    uses: ./.github/workflows/test.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Verify the tag matches package.json before publishing.
      - name: Check version matches tag
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # Publish from dist/, which carries the minimal generated package.json
      # (consumer fields only — no scripts/devDependencies/source). The Test
      # workflow above is the gate; build already ran in this job.
      - name: Publish to NPM
        run: npm publish --provenance --access public
        working-directory: dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
