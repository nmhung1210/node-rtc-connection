name: Publish to NPM

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      coturn:
        image: coturn/coturn:latest
        ports:
          - 3478:3478/udp
          - 3478:3478/tcp
        options: >-
          --entrypoint turnserver
          coturn/coturn:latest
          -n
          --listening-port=3478
          --fingerprint
          --lt-cred-mech
          --user=testuser:testpass
          --user=nodertc:nodertcpass
          --realm=nodertc.local
          --no-tls
          --no-dtls

    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # The TURN relay test uses the coturn service above; the browser interop
      # test self-skips (Playwright's Chromium is not installed here).
      - name: Run tests
        run: npm test
        env:
          TURN_HOST: 127.0.0.1

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Verify the tag matches package.json before publishing.
      - name: Check version matches tag
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # Skip integration suites here (no coturn service / Chromium in this job);
      # the matrix test job above already gated them. prepublishOnly re-runs
      # build + tests, so SKIP_INTEGRATION keeps that fast and deterministic.
      - name: Publish to NPM
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          SKIP_INTEGRATION: '1'
