# Coturn TURN Server Configuration for NodeRTC Testing

# Listening port for TURN
listening-port=3478

# TLS listening port (optional, for TURNS)
# tls-listening-port=5349

# Listening IP
listening-ip=0.0.0.0

# External IP (will be auto-detected)
# external-ip=YOUR_PUBLIC_IP

# Relay IP (same as listening IP for local testing)
relay-ip=0.0.0.0

# Enable verbose logging
verbose

# Use fingerprints in TURN messages
fingerprint

# Use long-term credentials
lt-cred-mech

# Static user accounts for testing
user=testuser:testpass
user=nodertc:nodertcpass

# Realm for authentication
realm=nodertc.local

# No TLS (for simplicity in testing)
no-tls
no-dtls

# Allow all peer addresses (for testing)
no-multicast-peers

# Disable TLS for simplicity
no-tlsv1
no-tlsv1_1
no-tlsv1_2

# Enable STUN
stun-only=false

# Allow UDP and TCP
no-udp=false
no-tcp=false

# Disable CLI
no-cli

# Log file
log-file=/var/log/coturn/turn.log

# Simple log
simple-log

# Allocation quota
max-allocate-lifetime=3600
